name: Docs

on:
  push:
    branches:
      - main
    paths:
      - docs/docs/**
      - docs/src/**
      - docs/static/**
      - docs/docusaurus.config.ts
      - docs/package.json

concurrency:
  group: ${{ github.workflow }}

permissions:
  contents: read

jobs:

  init:
    name: Init
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install semantic-release and plugins
        run: npm install -g semantic-release @semantic-release/github @semantic-release/git @semantic-release/changelog
        working-directory: docs
      - name: Get next version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "NEXT_VERSION=$(semantic-release --dry-run | grep "Release note for version" |sed -n 's/.*Release note for version \([0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1/p')" >> $GITHUB_ENV
        working-directory: docs
      - name: Update package.json
        run: |
          sed -i'' -e "s/\"version\": \".*\"/\"version\": \"${{ env.NEXT_VERSION }}\"/" package.json
        working-directory: docs
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: package_json
          path: docs/package.json

  build:
    name: Build
    needs: init
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: package_json
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Docusaurus dependencies
        run: npm install
        working-directory: docs
      - name: Build Docusaurus site
        run: npm run build
        working-directory: docs
      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/

  release:
    name: release
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      id-token: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: package_json
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install semantic-release and plugins
        run: npm install -g semantic-release @semantic-release/github @semantic-release/git @semantic-release/changelog
        working-directory: docs
      
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release
        working-directory: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4